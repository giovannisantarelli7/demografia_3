<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#ffffff;
      --panel:rgba(255,255,255,0.94);
      --line:rgba(50,33,20,0.14);
      --text:#1f1a17;
      --muted:#6c625a;
      --brick:#9b4a33;
      --brown:#8c6340;
      --blue:#3f6f9c;
      --sand:#d8bf9a;
      --sand-deep:#c7a678;
      --shadow:0 18px 45px rgba(46,28,15,0.10);
      --shadow-soft:0 10px 28px rgba(46,28,15,0.08);
    }

    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    body {
      background:var(--bg);
      color:var(--text);
      font-family:Georgia,"Times New Roman",serif;
      line-height:1.55;
    }

    .page {
      width:100%;
      height:100vh;
      overflow:hidden;
      --title-offset:0px;
    }

    .story-section {
      height:100%;
      max-width:1180px;
      margin:0 auto;
      padding:18px 14px;
      display:grid;
      grid-template-rows:minmax(0,1fr);
      overflow:hidden;
    }

    .sticky-viz {
      position:relative;
      z-index:2;
      height:100%;
      min-height:0;
      display:grid;
      grid-template-rows:auto minmax(260px,1fr) auto;
      gap:10px;
      padding:12px;
      background:linear-gradient(180deg,#efe7dc 0%,#ece3d7 100%);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:clip;
    }

    .viz-top {
      display:grid;
      grid-template-columns:minmax(300px,1.15fr) minmax(250px,.85fr);
      gap:12px;
      align-items:start;
    }

    .head-card,.legend-card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow-soft);
      padding:10px 12px;
    }

    .chart-kicker {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(50,33,20,.08);
      color:var(--muted);
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .head-card h2 {
      margin:0 0 6px;
      font-size:clamp(24px,3vw,38px);
      line-height:1.04;
      font-style:italic;
      font-weight:400;
    }

    .head-card p,.legend-card p { margin:0; font-size:13px; color:var(--muted); }
    .legend-title { margin:0 0 10px !important; font-size:15px !important; font-weight:700; color:var(--text) !important; }
    .legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; }
    .legend-row { display:flex; align-items:center; gap:10px; min-width:0; font-size:13px; color:var(--text); }
    .swatch { width:38px; height:14px; border-radius:999px; border:1px solid rgba(40,28,20,.10); flex:0 0 auto; }
    .s0 { background:linear-gradient(90deg,rgba(216,191,154,.30),rgba(199,166,120,.95)); }
    .s1 { background:linear-gradient(90deg,rgba(63,111,156,.24),rgba(63,111,156,.88)); }
    .s2 { background:linear-gradient(90deg,rgba(140,99,64,.28),rgba(140,99,64,.9)); }
    .s3 { background:linear-gradient(90deg,rgba(155,74,51,.30),rgba(155,74,51,.92)); }

    .plot-card {
      position:relative;
      background:rgba(255,255,255,.20);
      border:1px solid rgba(50,33,20,.10);
      border-radius:16px;
      padding:8px;
      min-height:0;
    }

    .plot-shell {
      position:relative;
      width:100%;
      height:100%;
      min-height:260px;
      border-radius:12px;
      background:linear-gradient(180deg,rgba(255,255,255,.24) 0%,rgba(255,255,255,.16) 100%);
      overflow:hidden;
    }

    .plot-svg { width:100%; height:100%; display:block; overflow:visible; }

    .viz-foot {
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-end;
      padding:0 2px;
      color:var(--muted);
      font-size:12px;
    }

    .viz-foot .source { white-space:nowrap; }

    .hover-card {
      position:absolute;
      pointer-events:none;
      z-index:7;
      transform:translate(-50%,calc(-100% - 10px));
      background:rgba(255,255,255,.96);
      border:1px solid rgba(50,33,20,.10);
      box-shadow:0 8px 20px rgba(46,28,15,.10);
      color:var(--text);
      font-family:Georgia,"Times New Roman",serif;
      font-size:12px;
      padding:7px 9px;
      border-radius:10px;
      white-space:nowrap;
      opacity:0;
      transition:opacity 120ms ease;
    }

    .hover-card.is-visible { opacity:1; }

    @media (max-width:980px) {
      .story-section { padding-left:10px; padding-right:10px; }
      .sticky-viz { gap:8px; padding:9px; border-radius:18px; }
      .viz-top { grid-template-columns:1fr; }
      .plot-shell { min-height:236px; }
      .viz-foot { flex-direction:column; align-items:flex-start; }
    }

    @media (max-width:700px) {
      .plot-shell { min-height:220px; }
      .legend-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="story-section chart-story" id="storyAbsolute">
      <div class="sticky-viz">
        <div class="viz-top">
          <div class="head-card">
            <div class="chart-kicker">Valori assoluti</div>
            <h2>Calo e invecchiamento della popolazione</h2>
            <p>Scorri: la serie si apre da sinistra a destra.</p>
          </div>
          <div class="legend-card">
            <p class="legend-title">Fasce d’età</p>
            <div class="legend-grid">
              <div class="legend-row"><span class="swatch s0"></span><span>0–14 anni</span></div>
              <div class="legend-row"><span class="swatch s1"></span><span>15–34 anni</span></div>
              <div class="legend-row"><span class="swatch s2"></span><span>35–64 anni</span></div>
              <div class="legend-row"><span class="swatch s3"></span><span>65+ anni</span></div>
            </div>
          </div>
        </div>

        <div class="plot-card">
          <div class="plot-shell">
            <svg class="plot-svg" id="svgAbsolute" viewBox="0 0 980 430" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="absTitle absDesc">
              <title id="absTitle">Popolazione per fasce d’età nel cratere del terremoto, valori assoluti</title>
              <desc id="absDesc">Grafico stacked area che mostra il numero di residenti dal 1991 al 2021 per quattro fasce d’età, con una linea verticale sul 2016.</desc>
            </svg>
            <div class="hover-card" id="hoverAbsolute" aria-hidden="true"></div>
          </div>
        </div>

        <div class="viz-foot">
          <div></div>
          <div class="source">Fonte: Istat</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const data=[{"year":1991,"values":{"0-14 anni":85873,"15-34 anni":152312,"35-64 anni":213214,"65+ anni":102260},"total":553659,"shares":{"0-14 anni":15.5,"15-34 anni":27.5,"35-64 anni":38.5,"65+ anni":18.5}},{"year":2001,"values":{"0-14 anni":64612,"15-34 anni":116395,"35-64 anni":212097,"65+ anni":124205},"total":517309,"shares":{"0-14 anni":12.5,"15-34 anni":22.5,"35-64 anni":41.0,"65+ anni":24.0}},{"year":2011,"values":{"0-14 anni":56000,"15-34 anni":91636,"35-64 anni":216363,"65+ anni":145091},"total":509090,"shares":{"0-14 anni":11.0,"15-34 anni":18.0,"35-64 anni":42.5,"65+ anni":28.5}},{"year":2016,"values":{"0-14 anni":52535,"15-34 anni":80053,"35-64 anni":212642,"65+ anni":155104},"total":500334,"shares":{"0-14 anni":10.5,"15-34 anni":16.0,"35-64 anni":42.5,"65+ anni":31.0}},{"year":2021,"values":{"0-14 anni":44426,"15-34 anni":67809,"35-64 anni":189396,"65+ anni":166014},"total":467645,"shares":{"0-14 anni":9.5,"15-34 anni":14.5,"35-64 anni":40.5,"65+ anni":35.5}}];

    const bands=[
      {key:'0-14 anni',fill:'rgba(216,191,154,0.82)',stroke:'#c7a678'},
      {key:'15-34 anni',fill:'rgba(63,111,156,0.74)',stroke:'#3f6f9c'},
      {key:'35-64 anni',fill:'rgba(140,99,64,0.76)',stroke:'#8c6340'},
      {key:'65+ anni',fill:'rgba(155,74,51,0.78)',stroke:'#9b4a33'}
    ];

    const fmt=new Intl.NumberFormat('it-IT');

    function createChart(sectionId,svgId,hoverId,mode){
      const section=document.getElementById(sectionId);
      const svg=document.getElementById(svgId);
      const hoverCard=document.getElementById(hoverId);
      const NS='http://www.w3.org/2000/svg';
      const width=980;
      const height=430;
      const margin={top:20,right:28,bottom:50,left:92};
      const innerWidth=width-margin.left-margin.right;
      const innerHeight=height-margin.top-margin.bottom;
      const chartLeft=margin.left;
      const chartTop=margin.top;
      const chartBottom=chartTop+innerHeight;
      const x=(year)=>chartLeft+((year-data[0].year)/(data[data.length-1].year-data[0].year))*innerWidth;
      const makeEl=(name,attrs={},parent=svg)=>{
        const el=document.createElementNS(NS,name);
        Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
        parent.appendChild(el);
        return el;
      };

      const chartData=data.map(d=>{
        const total=d.total;
        let cumulative=0;
        const layers=bands.map(b=>{
          const raw=d.values[b.key];
          const value=mode==='percent' ? +(raw/total*100).toFixed(2) : raw;
          const y0=cumulative;
          cumulative+=value;
          return {key:b.key,raw,value,y0,y1:cumulative};
        });
        return {year:d.year,total,values:d.values,shares:d.shares,layers};
      });

      const maxValue=mode==='percent' ? 100 : Math.max(...chartData.map(d=>d.total));
      const y=(value)=>chartTop+innerHeight-(value/maxValue)*innerHeight;

      const defs=makeEl('defs');
      const clip=makeEl('clipPath',{id:`${svgId}Clip`},defs);
      const clipRect=makeEl('rect',{x:chartLeft,y:chartTop-10,width:0,height:innerHeight+20},clip);
      const gridGroup=makeEl('g');
      const axisGroup=makeEl('g');
      const areaGroup=makeEl('g',{'clip-path':`url(#${svgId}Clip)`});
      const pointGroup=makeEl('g',{'clip-path':`url(#${svgId}Clip)`});
      const markerGroup=makeEl('g');

      makeEl('rect',{x:chartLeft,y:chartTop,width:innerWidth,height:innerHeight,fill:'rgba(255,255,255,0.24)',stroke:'rgba(50,33,20,0.08)',rx:10,ry:10});

      const yTicks=mode==='percent' ? [0,20,40,60,80,100] : [0,100000,200000,300000,400000,500000,550000];
      yTicks.forEach(tick=>{
        const yy=y(tick);
        makeEl('line',{x1:chartLeft,x2:chartLeft+innerWidth,y1:yy,y2:yy,stroke:tick===0?'rgba(50,33,20,0.22)':'rgba(50,33,20,0.12)','stroke-width':tick===0?1.2:1,'stroke-dasharray':tick===0?'0':'4 8'},gridGroup);
        const label=makeEl('text',{x:chartLeft-18,y:yy+4,'text-anchor':'end',fill:'#6c625a','font-size':12},axisGroup);
        label.textContent=mode==='percent' ? `${tick}%` : (tick===0 ? '0' : fmt.format(tick));
      });

      makeEl('line',{x1:chartLeft,x2:chartLeft+innerWidth,y1:chartBottom,y2:chartBottom,stroke:'rgba(50,33,20,0.20)','stroke-width':1.2},axisGroup);

      data.forEach(d=>{
        const xx=x(d.year);
        makeEl('line',{x1:xx,x2:xx,y1:chartBottom,y2:chartBottom+8,stroke:'rgba(50,33,20,0.20)','stroke-width':1.2},axisGroup);
        const t=makeEl('text',{x:xx,y:chartBottom+28,'text-anchor':'middle',fill:d.year===2016?'#9b4a33':'#1f1a17','font-size':d.year===2016?15:14,'font-weight':d.year===2016?700:400},axisGroup);
        t.textContent=d.year;
      });

      const yLabelX=mode==='percent' ? 18 : 14;
      const yLabel=makeEl('text',{x:yLabelX,y:chartTop+innerHeight/2,transform:`rotate(-90 ${yLabelX} ${chartTop+innerHeight/2})`,'text-anchor':'middle',fill:'#6c625a','font-size':12},axisGroup);
      yLabel.textContent=mode==='percent' ? 'Quota sul totale' : 'Residenti';

      const xLabel=makeEl('text',{x:chartLeft+innerWidth,y:chartBottom+44,'text-anchor':'end',fill:'#6c625a','font-size':13},axisGroup);
      xLabel.textContent='Anno';

      function linePoints(bandKey,upper=true){
        return chartData.map(row=>{
          const layer=row.layers.find(l=>l.key===bandKey);
          return `${x(row.year)},${upper ? y(layer.y1) : y(layer.y0)}`;
        });
      }

      function areaPath(bandKey){
        const topPts=linePoints(bandKey,true);
        const bottomPts=linePoints(bandKey,false).reverse();
        const first=topPts[0].split(',');
        return `M ${first[0]} ${first[1]} L ${topPts.map(p=>p.replace(',', ' ')).join(' L ')} L ${bottomPts.map(p=>p.replace(',', ' ')).join(' L ')} Z`;
      }

      bands.forEach(band=>{
        makeEl('path',{d:areaPath(band.key),fill:band.fill,stroke:'none'},areaGroup);
        const topPts=linePoints(band.key,true);
        const first=topPts[0].split(',');
        makeEl('path',{d:`M ${first[0]} ${first[1]} L ${topPts.map(p=>p.replace(',', ' ')).join(' L ')}`,fill:'none',stroke:band.stroke,'stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'},areaGroup);
      });

      const x2016=x(2016);
      const markerLine=makeEl('line',{x1:x2016,x2:x2016,y1:chartTop,y2:chartBottom,stroke:'#9b4a33','stroke-width':2,'stroke-dasharray':'8 6',opacity:.2},markerGroup);
      const markerBadge=makeEl('rect',{x:x2016-50,y:chartTop+6,width:100,height:24,fill:'rgba(255,255,255,0.94)',stroke:'rgba(155,74,51,0.24)',rx:10,ry:10,opacity:.15},markerGroup);
      const markerText=makeEl('text',{x:x2016,y:chartTop+22,'text-anchor':'middle',fill:'#9b4a33','font-size':12,'font-weight':700,opacity:.2},markerGroup);
      markerText.textContent='2016 · sisma';

      data.forEach(row=>{
        const xx=x(row.year);
        chartData.find(s=>s.year===row.year).layers.forEach((layer,i)=>{
          makeEl('circle',{cx:xx,cy:y(layer.y1),r:3.5,fill:bands[i].stroke,stroke:'rgba(255,255,255,0.95)','stroke-width':1.2},pointGroup);
        });

        const hit=makeEl('circle',{cx:xx,cy:mode==='percent' ? y(50) : y(row.total/2),r:18,fill:'rgba(255,255,255,0.001)',cursor:'pointer'},pointGroup);
        hit.setAttribute('tabindex','0');
        hit.setAttribute('aria-label',`Anno ${row.year}, totale ${fmt.format(row.total)}`);
        const show=()=>showHover(row,xx);
        hit.addEventListener('mouseenter',show);
        hit.addEventListener('mousemove',show);
        hit.addEventListener('mouseleave',hideHover);
        hit.addEventListener('focus',show);
        hit.addEventListener('blur',hideHover);
      });

      function showHover(row,svgX){
        const rect=svg.getBoundingClientRect();
        const shellRect=hoverCard.parentElement.getBoundingClientRect();
        const xPos=rect.left+((svgX/width)*rect.width)-shellRect.left;
        const yPos=rect.top+rect.height*.22-shellRect.top;
        hoverCard.innerHTML=`<strong>${row.year}</strong><br>Totale: ${fmt.format(row.total)}<br>0–14: ${fmt.format(row.values['0-14 anni'])}<br>15–34: ${fmt.format(row.values['15-34 anni'])}<br>35–64: ${fmt.format(row.values['35-64 anni'])}<br>65+: ${fmt.format(row.values['65+ anni'])}`;
        hoverCard.style.left=`${xPos}px`;
        hoverCard.style.top=`${yPos}px`;
        hoverCard.classList.add('is-visible');
      }

      function hideHover(){
        hoverCard.classList.remove('is-visible');
      }

      function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

      function setReveal(progress){
        const currentProgress=clamp(progress,0,1);
        clipRect.setAttribute('width',innerWidth*currentProgress);
        const progress2016=(x2016-chartLeft)/innerWidth;
        const markerFactor=clamp((currentProgress-progress2016+.08)/.16,0,1);
        markerLine.setAttribute('opacity',.2+markerFactor*.8);
        markerText.setAttribute('opacity',.2+markerFactor*.8);
        markerBadge.setAttribute('opacity',.15+markerFactor*.85);
      }

      let progress=0;

      function applyProgress(nextProgress){
        progress=clamp(nextProgress,0,1);
        setReveal(progress);
      }

      function handleMessage(event){
        const payload=event.data;
        if(!payload || typeof payload!=='object') return;
        if(payload.type!=='timeline-progress') return;
        const next=Number(payload.progress);
        if(Number.isNaN(next)) return;
        applyProgress(next);
      }

      window.addEventListener('message',handleMessage);
      window.addEventListener('resize',()=>applyProgress(progress));

      if(window.parent!==window){
        window.parent.postMessage({ type:'timeline-ready', id: sectionId }, '*');
      }

      applyProgress(0);
      return { setProgress: applyProgress };
    }

    createChart('storyAbsolute','svgAbsolute','hoverAbsolute','absolute');
  </script>
</body>
</html>
